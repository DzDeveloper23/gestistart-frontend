<form [formGroup]="clientForm" (ngSubmit)="onSubmit()" class="client-form">
  <div class="row g-3">
    <!-- Nom Contact -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="nomContact" class="form-label">
          <i class="bi bi-person"></i>
          Nom du contact *
        </label>
        <input
          type="text"
          id="nomContact"
          class="form-control"
          formControlName="nomContact"
          placeholder="Jean Dupont"
          [class.is-invalid]="nomContact?.invalid && nomContact?.touched"
        >
        <div class="invalid-feedback" *ngIf="nomContact?.invalid && nomContact?.touched">
          <span *ngIf="nomContact?.errors?.['required']">Le nom du contact est obligatoire</span>
          <span *ngIf="nomContact?.errors?.['minlength']">Minimum 3 caractères</span>
        </div>
      </div>
    </div>

    <!-- Nom Entreprise -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="nomEntreprise" class="form-label">
          <i class="bi bi-building"></i>
          Nom de l'entreprise *
        </label>
        <input
          type="text"
          id="nomEntreprise"
          class="form-control"
          formControlName="nomEntreprise"
          placeholder="ACME Corp"
          [class.is-invalid]="nomEntreprise?.invalid && nomEntreprise?.touched"
        >
        <div class="invalid-feedback" *ngIf="nomEntreprise?.invalid && nomEntreprise?.touched">
          <span *ngIf="nomEntreprise?.errors?.['required']">Le nom de l'entreprise est obligatoire</span>
          <span *ngIf="nomEntreprise?.errors?.['minlength']">Minimum 2 caractères</span>
        </div>
      </div>
    </div>

    <!-- Email -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="email" class="form-label">
          <i class="bi bi-envelope"></i>
          Email *
        </label>
        <input
          type="email"
          id="email"
          class="form-control"
          formControlName="email"
          placeholder="contact@acme.com"
          [class.is-invalid]="email?.invalid && email?.touched"
        >
        <div class="invalid-feedback" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">L'email est obligatoire</span>
          <span *ngIf="email?.errors?.['email']">Format d'email invalide</span>
        </div>
      </div>
    </div>

    <!-- Téléphone -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="telephone" class="form-label">
          <i class="bi bi-telephone"></i>
          Téléphone
        </label>
        <input
          type="tel"
          id="telephone"
          class="form-control"
          formControlName="telephone"
          placeholder="+33 1 23 45 67 89"
        >
      </div>
    </div>

    <!-- Adresse -->
    <div class="col-12">
      <div class="form-group">
        <label for="adresse" class="form-label">
          <i class="bi bi-geo-alt"></i>
          Adresse
        </label>
        <input
          type="text"
          id="adresse"
          class="form-control"
          formControlName="adresse"
          placeholder="123 Rue de Paris, 75001 Paris"
        >
      </div>
    </div>

    <!-- Statut -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="status" class="form-label">
          <i class="bi bi-tag"></i>
          Statut *
        </label>
        <select
          id="status"
          class="form-control"
          formControlName="status"
        >
          <option *ngFor="let status of statusOptions" [value]="status">
            {{ status }}
          </option>
        </select>
      </div>
    </div>

    <!-- Notes -->
    <div class="col-12">
      <div class="form-group">
        <label for="notes" class="form-label">
          <i class="bi bi-sticky"></i>
          Notes
        </label>
        <textarea
          id="notes"
          class="form-control"
          formControlName="notes"
          rows="3"
          placeholder="Notes supplémentaires..."
        ></textarea>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="form-actions">
    <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading">
      <i class="bi bi-x-circle"></i>
      Annuler
    </button>
    <button type="submit" class="btn btn-primary" [disabled]="isLoading || clientForm.invalid">
      <span *ngIf="!isLoading">
        <i class="bi bi-check-circle"></i>
        {{ isEditMode ? 'Mettre à jour' : 'Créer le client' }}
      </span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2"></span>
        Enregistrement...
      </span>
    </button>
  </div>
</form>
