<div class="client-edit-container">
  <app-page-header
    [title]="'Modifier ' + (client?.nomEntreprise || 'le client')"
    subtitle="Mettre à jour les informations du client"
    icon="bi-pencil"
    [showBackButton]="true"
  ></app-page-header>

  <!-- Loading -->
  <div *ngIf="isLoadingClient" class="loading-container">
    <app-loading-spinner message="Chargement du client..."></app-loading-spinner>
  </div>

  <!-- Form -->
  <div *ngIf="!isLoadingClient && client" class="form-container fade-in">
    <div class="card">
      <div class="card-body">
        <app-client-form
          [client]="client"
          [isLoading]="isLoading"
          (submitForm)="onSubmit($event)"
          (cancel)="onCancel()"
        ></app-client-form>
      </div>
    </div>
  </div>
</div>
