<div class="clients-list-container">
  <app-page-header
    title="Clients"
    subtitle="Gérer votre portefeuille clients"
    icon="bi-building"
  >
    <button class="btn btn-primary" (click)="createClient()">
      <i class="bi bi-plus-circle"></i>
      Nouveau client
    </button>
  </app-page-header>

  <!-- Filters -->
  <div class="filters-section card mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-5">
          <label for="searchQuery" class="form-label">
            <i class="bi bi-search"></i>
            Rechercher
          </label>
          <input
            type="text"
            id="searchQuery"
            class="form-control"
            [(ngModel)]="searchQuery"
            (keyup.enter)="onSearch()"
            placeholder="Nom entreprise, contact, email..."
          >
        </div>
        <div class="col-md-4">
          <label for="statusFilter" class="form-label">
            <i class="bi bi-funnel"></i>
            Statut
          </label>
          <select
            id="statusFilter"
            class="form-control"
            [(ngModel)]="selectedStatus"
            (change)="onFilterChange()"
          >
            <option value="">Tous les statuts</option>
            <option value="Actif">Actif</option>
            <option value="Inactif">Inactif</option>
            <option value="Prospect">Prospect</option>
          </select>
        </div>
        <div class="col-md-3 d-flex align-items-end gap-2">
          <button class="btn btn-primary flex-fill" (click)="onSearch()">
            <i class="bi bi-search"></i>
            Rechercher
          </button>
          <button class="btn btn-outline-secondary flex-fill" (click)="clearFilters()">
            <i class="bi bi-x-circle"></i>
            Effacer
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-container">
    <app-loading-spinner message="Chargement des clients..."></app-loading-spinner>
  </div>

  <!-- Clients Grid -->
  <div *ngIf="!isLoading && clients.length > 0" class="clients-grid fade-in">
    <app-client-card
      *ngFor="let client of clients"
      [client]="client"
      (view)="viewClient($event)"
      (edit)="editClient($event)"
      (delete)="confirmDelete($event)"
    ></app-client-card>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && clients.length === 0" class="empty-state">
    <i class="bi bi-building-x"></i>
    <h3>Aucun client trouvé</h3>
    <p>Commencez par ajouter votre premier client</p>
    <button class="btn btn-primary" (click)="createClient()">
      <i class="bi bi-plus-circle"></i>
      Ajouter un client
    </button>
  </div>

  <!-- Pagination -->
  <div *ngIf="!isLoading && clients.length > 0 && totalPages > 1" class="pagination-container">
    <nav>
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <a class="page-link" (click)="onPageChange(currentPage - 1)">
            <i class="bi bi-chevron-left"></i>
          </a>
        </li>
        <li
          class="page-item"
          *ngFor="let page of [].constructor(totalPages); let i = index"
          [class.active]="currentPage === i + 1"
        >
          <a class="page-link" (click)="onPageChange(i + 1)">{{ i + 1 }}</a>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <a class="page-link" (click)="onPageChange(currentPage + 1)">
            <i class="bi bi-chevron-right"></i>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Delete Confirmation Modal -->
  <app-confirmation-modal
    [show]="showDeleteModal"
    title="Supprimer le client"
    message="Êtes-vous sûr de vouloir supprimer ce client ? Cette action est irréversible."
    confirmText="Supprimer"
    cancelText="Annuler"
    type="danger"
    (confirm)="deleteClient()"
    (cancel)="cancelDelete()"
  ></app-confirmation-modal>
</div>
