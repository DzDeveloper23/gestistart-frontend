<div class="kanban-column">
  <div class="column-header" [attr.data-status]="getStatusColor()">
    <h5 class="column-title">{{ title }}</h5>
    <span class="task-count">{{ tasks.length }}</span>
  </div>

  <div
    class="column-body"
    (drop)="onDrop($event)"
    (dragover)="onDragOver($event)"
  >
    <div
      *ngFor="let task of tasks"
      class="kanban-task"
      draggable="true"
      (dragstart)="onDragStart($event, task._id)"
      (click)="onViewTask(task._id)"
    >
      <div class="task-priority">
        <app-status-badge [status]="task.priorite" type="priority"></app-status-badge>
      </div>

      <h6 class="task-title">{{ task.titre }}</h6>

      <p class="task-description" *ngIf="task.description">
        {{ task.description }}
      </p>

      <div class="task-footer">
        <div class="task-assigned" *ngIf="task.assigneId">
          <i class="bi bi-person-circle"></i>
          <span>{{ task.assigneId.nom }}</span>
        </div>
        <div class="task-date" *ngIf="task.dateEcheance">
          <i class="bi bi-calendar"></i>
          <span>{{ task.dateEcheance | dateFormat:'dd/MM' }}</span>
        </div>
      </div>
    </div>

    <div class="no-tasks" *ngIf="tasks.length === 0">
      <i class="bi bi-inbox"></i>
      <p>Aucune tâche</p>
    </div>
  </div>
</div>
