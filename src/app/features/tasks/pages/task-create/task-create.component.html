<div class="task-create-container">
  <app-page-header
    title="Créer une tâche"
    subtitle="Ajouter une nouvelle tâche au projet"
    icon="bi-plus-circle"
    [showBackButton]="true"
  ></app-page-header>

  <div class="form-container fade-in">
    <div class="card">
      <div class="card-body">
        <app-task-form
          [projects]="projects"
          [employees]="employees"
          [isLoading]="isLoading"
          (submitForm)="onSubmit($event)"
          (cancel)="onCancel()"
        ></app-task-form>
      </div>
    </div>
  </div>
</div>
