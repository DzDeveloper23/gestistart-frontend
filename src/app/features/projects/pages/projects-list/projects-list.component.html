<div class="projects-list-container">
  <app-page-header
    title="Projets"
    subtitle="Gérer tous vos projets"
    icon="bi-folder"
  >
    <button class="btn btn-primary" (click)="createProject()">
      <i class="bi bi-plus-circle"></i>
      Nouveau projet
    </button>
  </app-page-header>

  <!-- Filters -->
  <div class="filters-section card mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label for="statusFilter" class="form-label">
            <i class="bi bi-funnel"></i>
            Statut
          </label>
          <select
            id="statusFilter"
            class="form-control"
            [(ngModel)]="selectedStatus"
            (change)="onFilterChange()"
          >
            <option value="">Tous les statuts</option>
            <option value="En cours">En cours</option>
            <option value="En attente">En attente</option>
            <option value="Terminé">Terminé</option>
            <option value="Suspendu">Suspendu</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="priorityFilter" class="form-label">
            <i class="bi bi-flag"></i>
            Priorité
          </label>
          <select
            id="priorityFilter"
            class="form-control"
            [(ngModel)]="selectedPriority"
            (change)="onFilterChange()"
          >
            <option value="">Toutes les priorités</option>
            <option value="Basse">Basse</option>
            <option value="Moyenne">Moyenne</option>
            <option value="Haute">Haute</option>
            <option value="Critique">Critique</option>
          </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <button
            class="btn btn-outline-secondary w-100"
            (click)="selectedStatus = ''; selectedPriority = ''; onFilterChange()"
          >
            <i class="bi bi-x-circle"></i>
            Réinitialiser
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-container">
    <app-loading-spinner message="Chargement des projets..."></app-loading-spinner>
  </div>

  <!-- Projects Grid -->
  <div *ngIf="!isLoading && projects.length > 0" class="projects-grid fade-in">
    <app-project-card
      *ngFor="let project of projects"
      [project]="project"
      (view)="viewProject($event)"
      (edit)="editProject($event)"
      (delete)="confirmDelete($event)"
    ></app-project-card>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && projects.length === 0" class="empty-state">
    <i class="bi bi-folder-x"></i>
    <h3>Aucun projet trouvé</h3>
    <p>Commencez par créer votre premier projet</p>
    <button class="btn btn-primary" (click)="createProject()">
      <i class="bi bi-plus-circle"></i>
      Créer un projet
    </button>
  </div>

  <!-- Pagination -->
  <div *ngIf="!isLoading && projects.length > 0 && totalPages > 1" class="pagination-container">
    <nav>
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <a class="page-link" (click)="onPageChange(currentPage - 1)">
            <i class="bi bi-chevron-left"></i>
          </a>
        </li>
        <li
          class="page-item"
          *ngFor="let page of [].constructor(totalPages); let i = index"
          [class.active]="currentPage === i + 1"
        >
          <a class="page-link" (click)="onPageChange(i + 1)">{{ i + 1 }}</a>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <a class="page-link" (click)="onPageChange(currentPage + 1)">
            <i class="bi bi-chevron-right"></i>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Delete Confirmation Modal -->
  <app-confirmation-modal
    [show]="showDeleteModal"
    title="Supprimer le projet"
    message="Êtes-vous sûr de vouloir supprimer ce projet ? Cette action est irréversible."
    confirmText="Supprimer"
    cancelText="Annuler"
    type="danger"
    (confirm)="deleteProject()"
    (cancel)="cancelDelete()"
  ></app-confirmation-modal>
</div>
