<div class="team-management">
  <div class="team-header">
    <h5 class="team-title">
      <i class="bi bi-people"></i>
      Équipe du projet
      <span class="team-count">{{ team.length }}</span>
    </h5>
    <button class="btn btn-sm btn-primary" (click)="openAddModal()">
      <i class="bi bi-person-plus"></i>
      Ajouter un membre
    </button>
  </div>

  <div class="team-list" *ngIf="team.length > 0">
    <div class="team-member" *ngFor="let member of team">
      <div class="member-avatar">
        <i class="bi bi-person-circle"></i>
      </div>
      <div class="member-info">
        <h6 class="member-name">{{ member.nom }}</h6>
        <p class="member-role">{{ member.poste }}</p>
        <span class="member-email">{{ member.email }}</span>
      </div>
      <button
        class="btn-remove"
        (click)="onRemoveMember(member._id)"
        title="Retirer du projet"
      >
        <i class="bi bi-x-circle"></i>
      </button>
    </div>
  </div>

  <div class="no-team" *ngIf="team.length === 0">
    <i class="bi bi-people"></i>
    <p>Aucun membre dans l'équipe</p>
    <button class="btn btn-primary" (click)="openAddModal()">
      <i class="bi bi-person-plus"></i>
      Ajouter le premier membre
    </button>
  </div>

  <!-- Add Member Modal -->
  <div class="modal-backdrop" *ngIf="showAddModal" (click)="closeAddModal()"></div>
  <div class="modal-dialog" *ngIf="showAddModal" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Ajouter un membre</h5>
        <button class="btn-close" (click)="closeAddModal()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="employee" class="form-label">Sélectionner un employé</label>
          <select
            id="employee"
            class="form-control"
            [(ngModel)]="selectedEmployee"
          >
            <option value="">-- Choisir un employé --</option>
            <option *ngFor="let emp of filteredEmployees" [value]="emp._id">
              {{ emp.nom }} - {{ emp.poste }}
            </option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeAddModal()">
          Annuler
        </button>
        <button
          class="btn btn-primary"
          (click)="onAddMember()"
          [disabled]="!selectedEmployee"
        >
          <i class="bi bi-check"></i>
          Ajouter
        </button>
      </div>
    </div>
  </div>
</div>
