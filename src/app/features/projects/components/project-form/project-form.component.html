<form [formGroup]="projectForm" (ngSubmit)="onSubmit()" class="project-form">
  <div class="row g-3">
    <!-- Titre -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="titre" class="form-label">
          <i class="bi bi-card-text"></i>
          Titre du projet *
        </label>
        <input
          type="text"
          id="titre"
          class="form-control"
          formControlName="titre"
          placeholder="Nom du projet"
          [class.is-invalid]="titre?.invalid && titre?.touched"
        >
        <div class="invalid-feedback" *ngIf="titre?.invalid && titre?.touched">
          <span *ngIf="titre?.errors?.['required']">Le titre est obligatoire</span>
          <span *ngIf="titre?.errors?.['minlength']">Minimum 3 caractères</span>
        </div>
      </div>
    </div>

    <!-- Client -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="clientId" class="form-label">
          <i class="bi bi-building"></i>
          Client *
        </label>
        <select
          id="clientId"
          class="form-control"
          formControlName="clientId"
          [class.is-invalid]="clientId?.invalid && clientId?.touched"
        >
          <option value="">Sélectionner un client</option>
          <option *ngFor="let client of clients" [value]="client._id">
            {{ client.nomEntreprise }}
          </option>
        </select>
        <div class="invalid-feedback" *ngIf="clientId?.invalid && clientId?.touched">
          <span>Le client est obligatoire</span>
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="col-12">
      <div class="form-group">
        <label for="description" class="form-label">
          <i class="bi bi-text-paragraph"></i>
          Description
        </label>
        <textarea
          id="description"
          class="form-control"
          formControlName="description"
          rows="3"
          placeholder="Description du projet..."
        ></textarea>
      </div>
    </div>

    <!-- Budget -->
    <div class="col-md-4">
      <div class="form-group">
        <label for="budget" class="form-label">
          <i class="bi bi-currency-euro"></i>
          Budget (€) *
        </label>
        <input
          type="number"
          id="budget"
          class="form-control"
          formControlName="budget"
          placeholder="10000"
          [class.is-invalid]="budget?.invalid && budget?.touched"
        >
        <div class="invalid-feedback" *ngIf="budget?.invalid && budget?.touched">
          <span *ngIf="budget?.errors?.['required']">Le budget est obligatoire</span>
          <span *ngIf="budget?.errors?.['min']">Le budget doit être positif</span>
        </div>
      </div>
    </div>

    <!-- Date Début -->
    <div class="col-md-4">
      <div class="form-group">
        <label for="dateDebut" class="form-label">
          <i class="bi bi-calendar"></i>
          Date de début *
        </label>
        <input
          type="date"
          id="dateDebut"
          class="form-control"
          formControlName="dateDebut"
          [class.is-invalid]="dateDebut?.invalid && dateDebut?.touched"
        >
        <div class="invalid-feedback" *ngIf="dateDebut?.invalid && dateDebut?.touched">
          <span>La date de début est obligatoire</span>
        </div>
      </div>
    </div>

    <!-- Date Fin -->
    <div class="col-md-4">
      <div class="form-group">
        <label for="dateFin" class="form-label">
          <i class="bi bi-calendar-check"></i>
          Date de fin *
        </label>
        <input
          type="date"
          id="dateFin"
          class="form-control"
          formControlName="dateFin"
          [class.is-invalid]="dateFin?.invalid && dateFin?.touched"
        >
        <div class="invalid-feedback" *ngIf="dateFin?.invalid && dateFin?.touched">
          <span>La date de fin est obligatoire</span>
        </div>
      </div>
    </div>

    <!-- Priorité -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="priorite" class="form-label">
          <i class="bi bi-flag"></i>
          Priorité *
        </label>
        <select
          id="priorite"
          class="form-control"
          formControlName="priorite"
        >
          <option *ngFor="let priority of priorityOptions" [value]="priority">
            {{ priority }}
          </option>
        </select>
      </div>
    </div>

    <!-- Équipe -->
    <div class="col-md-6">
      <div class="form-group">
        <label for="team" class="form-label">
          <i class="bi bi-people"></i>
          Équipe
        </label>
        <select
          id="team"
          class="form-control"
          formControlName="team"
          multiple
          size="3"
        >
          <option *ngFor="let employee of employees" [value]="employee._id">
            {{ employee.nom }} - {{ employee.poste }}
          </option>
        </select>
        <small class="form-text text-muted">
          Maintenez Ctrl (Cmd sur Mac) pour sélectionner plusieurs employés
        </small>
      </div>
    </div>

    <!-- Notes -->
    <div class="col-12">
      <div class="form-group">
        <label for="notes" class="form-label">
          <i class="bi bi-sticky"></i>
          Notes
        </label>
        <textarea
          id="notes"
          class="form-control"
          formControlName="notes"
          rows="2"
          placeholder="Notes supplémentaires..."
        ></textarea>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="form-actions">
    <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading">
      <i class="bi bi-x-circle"></i>
      Annuler
    </button>
    <button type="submit" class="btn btn-primary" [disabled]="isLoading || projectForm.invalid">
      <span *ngIf="!isLoading">
        <i class="bi bi-check-circle"></i>
        {{ isEditMode ? 'Mettre à jour' : 'Créer le projet' }}
      </span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2"></span>
        Enregistrement...
      </span>
    </button>
  </div>
</form>
